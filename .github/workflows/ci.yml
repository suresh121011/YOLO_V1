name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dev dependencies
        # Bounded ranges match requirements.txt so CI and local tooling agree.
        run: |
          pip install --upgrade pip
          pip install "black>=24.0,<25.0" "ruff>=0.4,<1.0" "mypy>=1.10,<2.0" types-PyYAML types-requests

      - name: Run black (format check)
        run: black --check src/ scripts/ tests/

      - name: Run ruff (lint)
        run: ruff check src/ scripts/ tests/

      - name: Run mypy (type check)
        run: mypy src/dataset src/utils src/config src/logging
        # src/pipeline is deferred to the Phase-6 runtime cleanup (17 errors as of
        # the 2026-07-14 validation pass: mostly missing numpy stubs in a bare
        # CI-style env plus untyped defs in scene_analyzer.py/orchestrator.py;
        # see docs/04_dataset_engineering/README.md §7 for the Phase-2 descope).

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit + integration tests with coverage
        # Coverage floor lives in pyproject.toml ([tool.coverage.report]
        # fail_under) — ratchet it there as coverage grows.
        run: pytest tests/unit/ tests/integration/ --tb=short --cov=src --cov-report=term
