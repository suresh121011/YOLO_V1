# dvc.yaml — Elderly Assistant System Dataset Pipeline
# Reproducible pipeline from raw acquisition to a QA-verified training set.
#
# Every referenced script exists and runs (audit fix — the Stage-1 stub
# referenced scripts that were never written).
#
# Smoke vs full build: configs/dataset_sources.yaml `mode: smoke|full` is a
# tracked param — flip it and `dvc repro` re-runs the affected stages. The
# full dataset build is therefore exactly one command.
#
# Download caches (archives/CSV indexes) live in data/downloads_cache/,
# OUTSIDE the stage outs, so repro never re-downloads them.
#
# Custom captures (Phase-3): ingest_custom_captures / ingest_eval_set are
# FROZEN — dvc repro skips them so it never overwrites human-collected
# photos with an empty re-run on a fresh machine. They exist only so the
# data is tracked in dvc.lock like every other stage output; humans run
# 08_ingest_capture_session.py and `dvc commit -f <stage>` directly. See
# docs/04_dataset_engineering/capture_annotation_runbook.md.
#
# Usage:
#   dvc repro                 — reproduce all non-frozen stages
#   dvc repro qa_check        — reproduce up to QA
#   dvc dag                   — view the pipeline DAG
#   dvc metrics show          — show the QA metric
#   dvc commit -f ingest_custom_captures   — record a freshly ingested session
#   dvc commit -f ingest_eval_set          — record the locked eval set

stages:
  # ─── Acquisition (Phase-2) ──────────────────────────────────────────────────

  download_coco:
    cmd: python scripts/dataset/01_download_coco_subset.py
    deps:
      - scripts/dataset/01_download_coco_subset.py
      - src/dataset/downloaders/base.py
      - src/dataset/downloaders/coco.py
    params:
      - configs/dataset_sources.yaml:
          - mode
          - smoke
          - sources.coco
    outs:
      - data/raw/coco_filtered

  download_openimages:
    cmd: python scripts/dataset/02_download_openimages_subset.py
    deps:
      - scripts/dataset/02_download_openimages_subset.py
      - src/dataset/downloaders/base.py
      - src/dataset/downloaders/openimages.py
    params:
      - configs/dataset_sources.yaml:
          - mode
          - smoke
          - sources.openimages
    outs:
      - data/raw/openimages_filtered

  download_roboflow:
    cmd: python scripts/dataset/03_download_roboflow_datasets.py
    deps:
      - scripts/dataset/03_download_roboflow_datasets.py
      - src/dataset/downloaders/base.py
      - src/dataset/downloaders/roboflow_dl.py
    params:
      - configs/dataset_sources.yaml:
          - mode
          - smoke
          - sources.roboflow
    outs:
      - data/raw/roboflow_imports

  download_wider_face:
    cmd: python scripts/dataset/04_download_wider_face.py
    deps:
      - scripts/dataset/04_download_wider_face.py
      - src/dataset/downloaders/base.py
      - src/dataset/downloaders/wider_face.py
    params:
      - configs/dataset_sources.yaml:
          - mode
          - smoke
          - allow_noncommercial
          - sources.wider_face
    outs:
      - data/raw/wider_face

  collect_negatives:
    cmd: python scripts/dataset/06_collect_negatives.py
    deps:
      - scripts/dataset/06_collect_negatives.py
      - src/dataset/downloaders/negatives_dl.py
      - src/dataset/negatives.py
      # Ordering dependency: reuses the COCO annotation cache.
      - data/raw/coco_filtered
    params:
      - configs/dataset_sources.yaml:
          - mode
          - smoke
          - sources.negatives
    outs:
      - data/raw/negatives

  # ─── Custom captures (Phase-3, human-in-the-loop) ───────────────────────────
  # Frozen: dvc repro NEVER runs these (repro deletes stage outs before
  # re-running, which would wipe real ingested photos on any other machine).
  # Human loop: run 08_ingest_capture_session.py, then annotate via
  # 09_import_annotations.py, then `dvc commit -f <stage>` + `git commit
  # dvc.lock` + `dvc push`. See docs/04 capture_annotation_runbook.md.

  ingest_custom_captures:
    frozen: true
    cmd: python scripts/dataset/08_ingest_capture_session.py --verify-all
    outs:
      - data/raw/custom_captures

  ingest_eval_set:
    frozen: true
    cmd: python scripts/dataset/08_ingest_capture_session.py --verify-all --dataset eval
    outs:
      - data/eval/indian_home_v0

  # ─── Processing ─────────────────────────────────────────────────────────────

  remap_classes:
    # Copy mode: raw outputs stay immutable; taxonomy labels land in data/interim.
    cmd: python scripts/dataset/05_remap_classes.py --all
    deps:
      - scripts/dataset/05_remap_classes.py
      - src/dataset/remap.py
      - configs/data.yaml
      - data/raw/coco_filtered
      - data/raw/openimages_filtered
      - data/raw/roboflow_imports
      - data/raw/wider_face
      - data/raw/negatives
    params:
      - configs/dataset_sources.yaml:
          - sources
    outs:
      - data/interim

  merge_datasets:
    cmd: python scripts/dataset/07_merge_datasets.py
    deps:
      - scripts/dataset/07_merge_datasets.py
      - src/dataset/merge.py
      - src/dataset/dedup.py
      - src/dataset/filters.py
      - configs/data.yaml
      - data/raw/coco_filtered
      - data/raw/openimages_filtered
      - data/raw/roboflow_imports
      - data/raw/wider_face
      - data/raw/negatives
      - data/raw/custom_captures
      - data/interim
    params:
      - configs/dataset_sources.yaml:
          - mode
          - allow_noncommercial
          - dedup
          - indoor_filter
          - sources.custom_captures
    outs:
      - data/merged

  split_train_val_test:
    cmd: python scripts/dataset/split_dataset.py
    deps:
      - scripts/dataset/split_dataset.py
      - src/dataset/split_config.py
      - src/dataset/splitting
      - data/merged
      # M3 (ADR-P5-05): labels come from the verified-labels overlay
      # (split.source_labels_dir), images still from data/merged above.
      - data/merged_verified
    params:
      - configs/dataset_split_config.yaml:
          - split
    outs:
      - data/processed/images
      - data/processed/labels
      - data/processed/split_report

  # ─── Completeness metadata (Phase-4, missing-annotation mitigation) ────────
  # Compiles per-source/per-session trusted_classes into the per-image
  # completeness artifact the mitigation trainer masks the cls loss with.
  # Hard-fails on any ambiguity (unknown image, unmapped source, drift).

  generate_completeness:
    cmd: python scripts/dataset/11_generate_completeness.py
    deps:
      - scripts/dataset/11_generate_completeness.py
      - src/dataset/completeness.py
      - src/dataset/completeness_policies.py
      - configs/data.yaml
      - data/merged
      - data/processed/images
      - data/processed/split_report
      # M3 (ADR-P5-04): trusted_list_with_ledger sources read this directly.
      - data/annotation/verification_ledger.json
    params:
      - configs/dataset_sources.yaml:
          - completeness
    outs:
      - data/processed/completeness.json
      - data/qa_reports/completeness_report.json:
          cache: false

  # ─── QA (runs AFTER split — the leakage check needs splits) ────────────────

  qa_check:
    cmd: python scripts/qa/run_full_qa.py --exit-zero-on-warnings
    deps:
      - scripts/qa/run_full_qa.py
      - scripts/qa/check_annotations.py
      - scripts/dataset/dataset_stats.py
      - configs/data.yaml
      - data/processed/images
      - data/processed/labels
      - data/merged
    metrics:
      - data/qa_reports/annotation_qa_report.json:
          cache: false

  # ─── Phase-5 missing-annotation resolution (L2 auto-annotation) ────────────
  # Candidates NEVER touch labels/ directly (ADR-P5-01) — they land under
  # data/annotation/candidates/ and only reach training labels through the
  # human CVAT verification loop (M2: build_verification_batches →
  # import_verified_annotations → ledger → apply_verified_labels). This stage
  # declares the (currently empty, git-bootstrapped) ledger as a dep so its
  # DAG edge exists from day one — see dvc.yaml header note in the M2 commit
  # for why the human-loop stages that produce it declare no deps in return
  # (breaks the conceptual auto_annotate→...→ledger→auto_annotate cycle in
  # the declared graph; freshness is enforced by sha256 cross-checks instead,
  # G9/RG2 — council-verified, plan §"DAG acyclicity").

  auto_annotate:
    cmd: python scripts/dataset/12_auto_annotate.py
    deps:
      - scripts/dataset/12_auto_annotate.py
      - src/dataset/annotation
      - configs/data.yaml
      - data/merged
      - data/annotation/verification_ledger.json
    params:
      - configs/annotation.yaml:
          - auto_annotation
    outs:
      - data/annotation/candidates

  # FROZEN (mirrors ingest_custom_captures/ingest_eval_set): regenerating
  # mid-flight would orphan live CVAT tasks whose pre-annotations no longer
  # match a fresh batch plan. Humans run 13_build_verification_batches.py
  # directly, then `dvc commit -f build_verification_batches`.
  build_verification_batches:
    frozen: true
    cmd: python scripts/dataset/13_build_verification_batches.py
    outs:
      - data/annotation/batches

  # FROZEN, no deps (same rationale). Humans run 14_import_verified_batch.py
  # per batch (--batch, --export, --verifier), then
  # `dvc commit -f import_verified_annotations`. The ledger is a small,
  # git-tracked, append-only audit trail (cache: false) — like the QA
  # reports; verified_labels is DVC-cached (grows with scale).
  import_verified_annotations:
    frozen: true
    cmd: python scripts/dataset/14_import_verified_batch.py
    outs:
      - data/annotation/verification_ledger.json:
          cache: false
      - data/annotation/verified_labels

  # Pure deterministic derivation of already-frozen outputs — a normal
  # (non-frozen) stage, unlike the two human-loop stages above (ADR-P5-05).
  apply_verified_labels:
    cmd: python scripts/dataset/15_apply_verified_labels.py
    deps:
      - scripts/dataset/15_apply_verified_labels.py
      - src/dataset/annotation/apply.py
      - data/merged/labels
      - data/annotation/verification_ledger.json
      - data/annotation/verified_labels
    outs:
      - data/merged_verified

  # ─── Training (Phase-5 — declared but frozen until the dataset is released) ─

  train_yolo11n:
    frozen: true
    cmd: python scripts/training/train_yolo.py --config configs/training/yolo11n_config.yaml
    deps:
      - scripts/training/train_yolo.py
      - configs/data.yaml
      - configs/training/yolo11n_config.yaml
      - data/processed/images
      - data/processed/labels
      # Phase-4: completeness lineage — read at train time when
      # missing_annotation_mitigation.enabled is true.
      - data/processed/completeness.json
    outs:
      - models/yolo11n/weights

  # evaluate/export stages will be added in Phase-5 together with
  # scripts/training/evaluate_model.py and export_model.py (not yet written).
