# ─── Dataset Sources Configuration ────────────────────────────────────────────
# Elderly Assistant System — Phase-2 Dataset Acquisition Settings
#
# Read by: src/dataset/sources_config.py (and every scripts/dataset/0*_*.py CLI)
# Used as the DVC params file for the acquisition stages (see dvc.yaml).
#
# mode:
#   smoke — capped downloads (limit_per_source images) to validate the
#           pipeline end-to-end without multi-GB pulls.
#   full  — complete downloads honoring per-class caps only.
# The full dataset build is therefore: set `mode: full`, then `dvc repro`.
# ─────────────────────────────────────────────────────────────────────────────

mode: smoke

smoke:
  # Max images fetched per source in smoke mode
  limit_per_source: 60

# Governance gate: WIDER FACE (and possibly some Roboflow Universe datasets)
# are research-only / non-commercial. While true, such sources are included
# and flagged in manifests + QA license report. MUST be false for any
# commercial/shippable dataset build (see docs/04_dataset_engineering/).
allow_noncommercial: true

# Perceptual deduplication (runs at merge time, BEFORE splitting)
dedup:
  hamming_threshold: 5      # Hamming distance < threshold → duplicate
  check_flips: true         # also hash horizontally mirrored image
                            # (catches pre-augmented copies, e.g. Roboflow)
  hash_size: 8              # aHash grid; hash is hash_size**2 bits. 8 → 64-bit
                            # (coarse). 16 → 256-bit separates distinct capture
                            # frames an 8×8 hash over-merges (P2 audit). Retune
                            # hamming_threshold with it (absolute bit count).

# Indoor / quality filtering heuristics (docs/03 dataset_templates.md)
indoor_filter:
  enabled: true
  brightness_outdoor_threshold: 160   # mean grayscale > this → likely outdoor
  portrait_aspect_max: 0.6            # w/h < this → portrait → likely indoor
  min_image_dim: 320                  # reject images smaller than this

paths:
  raw_root: data/raw
  interim_root: data/interim          # remapped labels (DVC stage output)
  merged_root: data/merged
  downloads_cache: data/downloads_cache  # archives/indexes; OUTSIDE DVC outs
                                         # so `dvc repro` never re-downloads them

# ─── Label-completeness policies (Phase-4) ────────────────────────────────────
# Read by: scripts/dataset/11_generate_completeness.py
#          (src/dataset/completeness.py via src/dataset/completeness_policies.py)
# Used as the DVC params section of the generate_completeness stage.
#
# Disambiguates the trusted_classes semantics per source — never inferred from
# source names. Modes (registered in src/dataset/completeness_policies.py):
#   trusted_list         — sources.<name>.trusted_classes is the exhaustive set
#                          (cross-checked against the merged manifest)
#   verified_absence_all — images verified to contain NO taxonomy class;
#                          absence of every class is trusted supervision
#                          (negatives: all-ones completeness mask)
#   per_session          — trusted classes declared per finalized capture
#                          session manifest (data/raw/custom_captures/manifests)
#
# NOTE: deliberately a TOP-LEVEL section. Keys under sources.* would change the
# DVC params hashes of the acquisition stages and force re-downloads.
completeness:
  # M3 (ADR-P5-04): the human-verification ledger — masking shrinks exactly
  # as it grows. Sibling of `policies`, not a source (never a policy-mode
  # value); every `trusted_list_with_ledger` source reads the same ledger.
  ledger_path: data/annotation/verification_ledger.json
  policies:
    # Public sources opt into ledger-expanded masking explicitly (never
    # inferred) — M2 verification batches target these images.
    coco: trusted_list_with_ledger
    openimages: trusted_list_with_ledger
    roboflow: trusted_list_with_ledger
    wider_face: trusted_list_with_ledger
    negatives: verified_absence_all
    custom_captures: per_session
    local_captures: trusted_list_with_ledger   # single-class ZIPs; exhaustive annotation

# ─── Sources ──────────────────────────────────────────────────────────────────
# trusted_classes: classes this source labels EXHAUSTIVELY. Any other taxonomy
# class may appear unlabeled in these images — recorded in manifests so
# training can compensate (label-completeness policy, governance doc §3).

sources:
  coco:
    enabled: true
    output_dir: data/raw/coco_filtered
    license: "CC BY 4.0 (annotations); images retain original Flickr licenses"
    annotations_url: "http://images.cocodataset.org/annotations/annotations_trainval2017.zip"
    image_url_template: "http://images.cocodataset.org/{split}/{file_name}"
    smoke_split: val2017      # 5k-image annotation set — cheap smoke source
    full_split: train2017
    remap_table: coco
    indoor_filter: true       # apply brightness/aspect heuristics at merge
    trusted_classes:
      [person, water_bottle, knife, laptop, monitor, chair, bed, toilet, sink, book]
    class_caps:               # prevent imbalance (docs 01_download_coco_subset)
      person: 800
      chair: 500

  openimages:
    enabled: true
    output_dir: data/raw/openimages_filtered
    license: "Annotations CC BY 4.0; images CC BY 2.0 (per Open Images terms)"
    class_descriptions_url: "https://storage.googleapis.com/openimages/v7/oidv7-class-descriptions-boxable.csv"
    smoke_bbox_url: "https://storage.googleapis.com/openimages/v5/validation-annotations-bbox.csv"
    full_bbox_url: "https://storage.googleapis.com/openimages/v6/oidv6-train-annotations-bbox.csv"
    smoke_split: validation
    full_split: train
    image_url_template: "https://open-images-dataset.s3.amazonaws.com/{split}/{image_id}.jpg"
    remap_table: openimages
    indoor_filter: true       # apply brightness/aspect heuristics at merge
    classes: ["Door", "Cupboard", "Gas stove"]
    trusted_classes: [door, cupboard, stove]

  roboflow:
    enabled: true
    output_dir: data/raw/roboflow_imports
    license: "varies per Universe dataset — recorded per-dataset below"
    api_key_env: ROBOFLOW_API_KEY   # graceful skip when unset
    remap_table: roboflow
    trusted_classes: [medicine_bottle, charger, wire, gas_cylinder]
    # Roboflow Universe datasets to pull (workspace/project/version).
    # Populate after selecting datasets; each entry needs its own license
    # + class remap review before the full build.
    datasets: []
    #  - slug: "workspace/project"
    #    version: 1
    #    license: "CC BY 4.0"
    #    classes: {source_name: taxonomy_name}

  wider_face:
    enabled: true
    output_dir: data/raw/wider_face
    license: "research-only / non-commercial (WIDER FACE terms)"
    noncommercial: true       # gated by allow_noncommercial above
    smoke_images_url: "https://huggingface.co/datasets/CUHK-CSE/wider_face/resolve/main/data/WIDER_val.zip"
    full_images_url: "https://huggingface.co/datasets/CUHK-CSE/wider_face/resolve/main/data/WIDER_train.zip"
    annotations_url: "https://huggingface.co/datasets/CUHK-CSE/wider_face/resolve/main/data/wider_face_split.zip"
    remap_table: wider_face
    trusted_classes: [face]
    class_caps:               # M7: full-mode WIDER_train has ~160k face
                              # instances uncapped — would dwarf the rest of
                              # the ~30k-image full-mode budget
      face: 3000

  negatives:
    enabled: true
    output_dir: data/raw/negatives
    license: "inherits COCO licensing (sampled from COCO)"
    # Indoor COCO images containing NONE of the 23 taxonomy classes;
    # written with empty label files as background/negative examples.
    smoke_count: 20
    full_count: 500
    trusted_classes: []       # special case: verified absence of all classes

  custom_captures:
    enabled: false            # flip to true after the first session is
                              # finalized (scripts/dataset/09_import_annotations.py
                              # --finalize prints a reminder). Ingested via
                              # scripts/dataset/08_ingest_capture_session.py;
                              # see docs/04 capture_annotation_runbook.md.
    output_dir: data/raw/custom_captures
    license: "proprietary (consent-gated; see CaptureSessionManifest)"
    trusted_classes: []       # set per capture session

  local_captures:
    enabled: true             # Ingested by scripts/dataset/20_ingest_local_zips.py
                              # from the 22 Drive ZIPs in Dataset/.
    output_dir: data/raw/local_captures
    license: "proprietary (locally collected; see 20_ingest_local_zips.py)"
    remap_table: identity     # IDs are already in taxonomy space after ingestion
    trusted_classes:
      # Each sub-directory is single-class, so the listed class is exhaustively
      # annotated within that source. medicine_strip is TEMPORARY (Roboflow-sourced).
      - person
      - face
      - medicine_strip        # TEMPORARY — replace with own data before release
      - water_bottle          # bottel.zip — VERIFIED: water/beverage bottles only
      - knife
      - stove
      - gas_cylinder
      - passport
      - book
      - charger
      - wire
      - laptop
      - monitor
      - cupboard
      - door
      - chair
      - bed
      - toilet
      - sink
      - wet_floor
      - walking_stick
      - support_handle
