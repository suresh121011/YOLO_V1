# ─── Dataset Release Configuration ────────────────────────────────────────────
# Elderly Assistant System — Phase-5 Release Ladder & Gates
#
# Read by: scripts/dataset/18_make_release.py
#          (src/dataset/release/gates.py, src/dataset/release/manifest.py)
# Used as the DVC params file for the record_release stage (see dvc.yaml).
#
# Versioning scheme (data/DATASET_CHANGELOG.md, docs/03 dvc_pipeline.md):
#   dataset-v{major}.{minor}.{patch}
#     major — taxonomy or split-protocol reset
#     minor — ≥100 new images
#     patch — label/QA fixes only
#
# Release gates (implemented in src/dataset/release/gates.py):
#   RG1  qa_check zero criticals + artifact sweeps clean
#   RG2  completeness artifact valid + input hashes fresh
#   RG3  coverage + quality reports present, per-class thresholds met
#   RG4  data/DATASET_CHANGELOG.md has an entry for the version
#   RG5  git working tree clean, HEAD tagged
#   RG6  dvc push executed and `dvc status -c` clean
#   RG7  license gate (noncommercial sources enumerated + slug licenses recorded)
#   RG8  split leakage zero + eval-set zero image/house overlap
#   RG9  capture targets met (scripts/dataset/10_capture_progress.py)
#   RG10 A/B benchmark + evaluation reports present (v1.0 evidence)
#
# Ladder (ADR-P5-07): each release consumes COMPLETED human work — thresholds
# here are adjustable only with a recorded decision (changelog + ADR note).
# ─────────────────────────────────────────────────────────────────────────────

releases:
  dataset-v0.5.0:
    # Full-mode public build, masked-only mitigation, first-push verified.
    mode: full
    gates: [RG1, RG2, RG3, RG4, RG5, RG6, RG7]
    min_verified_cells: 0

  dataset-v0.7.0:
    # + verified auto-annotation expansion on public images.
    mode: full
    gates: [RG1, RG2, RG3, RG4, RG5, RG6, RG7]
    min_verified_cells: 3000
    min_coverage_score:
      charger: 0.5
      wire: 0.5
      medicine_bottle: 0.5
      cupboard: 0.5

  dataset-v0.9.0:
    # + custom captures (interim), locked eval set, house-level split live,
    # wet_floor R24 pilot decision recorded.
    mode: full
    gates: [RG1, RG2, RG3, RG4, RG5, RG6, RG7, RG8]
    split_strategy: leave_one_house_out
    min_custom_images: 1000
    min_houses: 2
    wet_floor_decision_required: true

  dataset-v1.0.0:
    # Production release: all targets, zero QA criticals, A/B evidence.
    # Ships as a RESEARCH-SCOPE release (allow_noncommercial: true recorded —
    # WIDER FACE); any commercial/shippable build requires the documented
    # v1.1 path that drops WIDER FACE (docs/04 §2).
    mode: full
    gates: [RG1, RG2, RG3, RG4, RG5, RG6, RG7, RG8, RG9, RG10]
    split_strategy: leave_one_house_out
    min_custom_images: 2000
    min_houses: 3
    min_instances_per_class: 200
