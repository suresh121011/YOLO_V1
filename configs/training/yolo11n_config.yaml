# ─── YOLO11n Training Configuration ───────────────────────────────────────────
# Elderly Assistant System — Nano Model Hyperparameters
#
# Target hardware: Raspberry Pi 5 (CPU-only), Android mid-range
# Target: mAP50 >= 0.70, Safety-class recall >= 0.80, >=15 FPS on target device
#
# Read by: scripts/training/train_yolo11n.py
# ─────────────────────────────────────────────────────────────────────────────

model:
  base: yolo11n.pt                 # Pretrained weights (auto-downloaded by Ultralytics)
  task: detect
  device: auto                     # cuda | cpu | mps | auto

training:
  data: configs/data.yaml
  epochs: 150
  imgsz: 640
  batch: 16                        # Reduce to 8 if GPU VRAM < 8GB
  patience: 25                     # Early stopping patience
  optimizer: AdamW
  lr0: 0.001                       # Initial learning rate
  lrf: 0.01                        # Final learning rate (as fraction of lr0)
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 5
  warmup_bias_lr: 0.1
  close_mosaic: 15                 # Disable mosaic augmentation last N epochs

augmentation:
  hsv_h: 0.015                     # Hue variation (handles different lighting)
  hsv_s: 0.5                       # Saturation variation
  hsv_v: 0.3                       # Value/brightness variation (Indian home lighting)
  degrees: 5.0                     # Rotation (±5° — simulate camera tilt)
  translate: 0.1
  scale: 0.4
  flipud: 0.0                      # No vertical flip (objects don't appear upside down)
  fliplr: 0.5                      # Horizontal flip (symmetric hazards)
  mosaic: 0.8                      # Mosaic augmentation probability
  mixup: 0.1
  copy_paste: 0.1

output:
  project: models
  name: yolo11n
  exist_ok: true
  save: true
  save_period: 10                  # Save checkpoint every N epochs
  val: true
  plots: true                      # Generate confusion matrix, PR curves
  verbose: true

# ─── WandB Experiment Tracking ─────────────────────────────────────────────────
# Optional: set WANDB_API_KEY environment variable to enable
wandb:
  enabled: false                   # Set true when WANDB_API_KEY is available
  project: elderly-assistant
  entity: null                     # Set your WandB username/team
  tags:
    - yolo11n
    - v1
    - indian-homes
