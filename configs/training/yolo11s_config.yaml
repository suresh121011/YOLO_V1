# ─── YOLO11s Training Configuration ───────────────────────────────────────────
# Elderly Assistant System — Small Model Hyperparameters
#
# Use this when YOLO11n accuracy is insufficient.
# Small model: ~11M params vs nano's ~2.6M — higher accuracy, higher latency.
# Target: mAP50 >= 0.75, still >=10 FPS on target device
#
# Read by: scripts/training/train_yolo.py (--config configs/training/yolo11s_config.yaml)
# ─────────────────────────────────────────────────────────────────────────────

model:
  base: yolo11s.pt
  task: detect
  device: auto

training:
  data: configs/data.yaml
  epochs: 150
  imgsz: 640
  batch: 8                         # Smaller batch for larger model
  patience: 25
  optimizer: AdamW
  lr0: 0.0008                      # Slightly lower LR for larger model
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 5
  warmup_bias_lr: 0.1
  close_mosaic: 15

augmentation:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.3
  degrees: 5.0
  translate: 0.1
  scale: 0.4
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.8
  mixup: 0.1
  copy_paste: 0.1

output:
  project: models
  name: yolo11s
  exist_ok: true
  save: true
  save_period: 10
  val: true
  plots: true
  verbose: true
